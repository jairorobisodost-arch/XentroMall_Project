<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XentroMall Renewal Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%); min-height: 100vh; }
        .map-container { 
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-content {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .map-icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        .map-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 10px;
        }
        .map-description {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .dashboard-button {
            display: inline-block;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .dashboard-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -12px rgba(0, 0, 0, 0.2);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .building-outline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 3px dashed #10b981;
            border-radius: 15px;
            opacity: 0.3;
        }
        .building-floor {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 3px;
            background: #10b981;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <div class="map-content">
            <!-- Building Icon -->
            <div class="building-outline"></div>
            <div class="building-floor"></div>
            
            <!-- Map Icon -->
            <div class="map-icon">
                <i class="fas fa-map-marked-alt"></i>
            </div>
            
            <!-- Map Title -->
            <div class="map-title">
                📍 XentroMall Renewal Center
            </div>
            
            <!-- Map Description -->
            <div class="map-description">
                <p><strong>You are here!</strong></p>
                <p>This is where you submit your renewal application.</p>
                <p>Go back to your dashboard to continue.</p>
            </div>
            
            <!-- Dashboard Button -->
            <a href="tenant_dashboard.php" class="dashboard-button">
                <i class="fas fa-arrow-left mr-2"></i>
                Back to Dashboard
            </a>
        </div>
    </div>
    
    <script>
        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add floating animation to the map icon
            const mapIcon = document.querySelector('.map-icon');
            if (mapIcon) {
                mapIcon.style.animation = 'pulse 2s infinite';
            }
        });
    </script>
</body>
</html>
